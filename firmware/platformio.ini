; PlatformIO configuration for Slider firmware

[env]
framework = arduino
lib_deps =
    gin66/FastAccelStepper@^0.30.0
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson@^7.0.0
    olikraus/U8g2@^2.35.0

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = opi_opi
board_build.flash_mode = opi
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DASYNCWEBSERVER_REGEX
    -DMAX_AXES=4
    -DMAX_TRAJECTORY_POINTS=10000
    -DTELEMETRY_RATE_HZ=50
    -DFIRMWARE_VERSION='"1.0.0"'

[env:slider_only]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DBUILD_SLIDER_ONLY

[env:slider_servo]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DBUILD_SLIDER_SERVO

[env:native]
platform = native
build_flags =
    -DMAX_AXES=4
    -DMAX_TRAJECTORY_POINTS=10000
    -DTELEMETRY_RATE_HZ=50
    -DNATIVE_TEST
    -DFIRMWARE_VERSION='"1.0.0-test"'
    -std=c++17
test_filter = test_*
lib_ignore =
    FastAccelStepper
    ESPAsyncWebServer
    AsyncTCP
    U8g2
